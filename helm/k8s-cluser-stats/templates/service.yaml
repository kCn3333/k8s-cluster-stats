apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-badge.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-badge.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "k8s-badge.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP

apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-badge.fullname" . }}-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-badge.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "k8s-badge.fullname" . }}-agent
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k8s-badge.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "k8s-badge.fullname" . }}-api
  labels:
    {{- include "k8s-badge.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [nodes, pods]
    verbs: [get, list]
  - apiGroups: [metrics.k8s.io]
    resources: [nodes]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "k8s-badge.fullname" . }}-api
  labels:
    {{- include "k8s-badge.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "k8s-badge.fullname" . }}-api
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ include "k8s-badge.fullname" . }}-api
  apiGroup: rbac.authorization.k8s.io

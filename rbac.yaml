apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-badge
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-badge
rules:
  # Read nodes and pods
  - apiGroups: [""]
    resources: [nodes, pods]
    verbs: [get, list]
  # Read metrics-server data
  - apiGroups: [metrics.k8s.io]
    resources: [nodes, pods]
    verbs: [get, list]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-badge
subjects:
  - kind: ServiceAccount
    name: k8s-badge
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: k8s-badge
  apiGroup: rbac.authorization.k8s.io

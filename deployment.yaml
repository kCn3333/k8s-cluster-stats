apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-badge
  namespace: monitoring
  labels:
    app: k8s-badge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-badge
  template:
    metadata:
      labels:
        app: k8s-badge
    spec:
      serviceAccountName: k8s-badge
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
        - name: k8s-badge
          image: your-registry/k8s-badge:latest
          ports:
            - containerPort: 8000
          env:
            - name: ALLOWED_CORS_SUFFIX
              value: ".your-domain.com"
            # Uncomment and populate if using server-stats agents for temperature:
            # - name: NODE_STATS_URLS
            #   value: "node-1=http://node-1.monitoring.svc:8000,node-2=http://node-2.monitoring.svc:8000"
          resources:
            requests:
              cpu: 20m
              memory: 48Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /metrics
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-badge
  namespace: monitoring
spec:
  selector:
    app: k8s-badge
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP

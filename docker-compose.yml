services:
  k8s-badge:
    build: .
    container_name: k8s-badge
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      # Mount your kubeconfig for local development.
      # In production (in-cluster) this volume is not needed.
      - ${HOME}/.kube/config:/home/appuser/.kube/config:ro
    security_opt:
      - no-new-privileges:true
    environment:
      ALLOWED_CORS_SUFFIX: ${ALLOWED_CORS_SUFFIX:-}
      # Optional: map node names to server-stats agent URLs for temperature data.
      # Format: node-1=http://node-1:8000,node-2=http://node-2:8000
      NODE_STATS_URLS: ${NODE_STATS_URLS:-}
